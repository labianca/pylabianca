version: 2.1
orbs:
  codecov: codecov/codecov@4.0.1
jobs:
  build:
    docker:
      - image: condaforge/mambaforge:latest
    parameters:
      mne_version:
        type: string
        default: "current"
      use_numba:
        type: string
        default: "no"
    steps:
      - checkout
      - run:
          name: Create conda env
          command: |
            apt-get update
            apt-get install -y gettext-base

            if [ << parameters.mne_version >> == "current" ]; then
              export XARRAY_VER=">=2026"
              export SCIPY_VER=">=1.11.3"
            else
              export XARRAY_VER="2023.10.1"
              export SCIPY_VER="<=1.16.2"
            fi

            envsubst < environment.template.yml > environment_ci.yml
            mamba env create -f environment_ci.yml
            source activate pylabianca

            if [ << parameters.use_numba >> == "yes" ]; then
              mamba install numba numbagg -y
            fi
            if [ << parameters.mne_version >> == "current" ]; then
              pip install mne
            else
              pip install mne==<< parameters.mne_version >>;
            fi

            pip install borsar elephant neo quantities statsmodels --no-deps
            mamba install pytest -y;
            hash -r pytest
            pip install pytest-cov
            pip install zetapy
      - run:
          name: Run tests
          command: |
            apt update
            apt-get -y install curl gnupg
            source activate pylabianca
            python -m pytest --cov=pylabianca pylabianca/test/ \
                             --cov-report xml:"./coverage.xml"
      - codecov/upload

workflows:
  workflow:
    jobs:
      - build:
          matrix:
            parameters:
              use_numba: ["yes", "no"]
              mne_version: ["current", "1.9.0", "1.6.1"]
